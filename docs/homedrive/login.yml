info:
  name: login
  type: http
  seq: 3

http:
  method: POST
  url: "{{host}}/api/auth/login"
  body:
    type: json
    data: |-
      {
        "username": "admin",
        "password": "123456"
      }
  auth: inherit

runtime:
  scripts:
    - type: after-response
      code: |-
        const json = res.body;

        if (json.token) {
                bru.setVar("jwt_token", json.token);
        }

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
